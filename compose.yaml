# https://github.com/docker-library/docs/blob/master/postgres/README.md#-via-docker-compose

name: kanban-api

services:

  db:
    image: postgres:16-alpine
    container_name: kanban-db
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_DB: db_kanban
      POSTGRES_USER: db_user
      POSTGRES_PASSWORD: db_pwd_changemeinprod
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U db_user -d db_kanban" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: kanban-db-admin
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      db:
        condition: service_healthy

  app:
    build: .
    container_name: kanban-api
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/db_kanban
      SPRING_DATASOURCE_USERNAME: db_user
      SPRING_DATASOURCE_PASSWORD: db_pwd_changemeinprod
      SPRING_FLYWAY_URL: jdbc:postgresql://db:5432/db_kanban
      SPRING_FLYWAY_USER: db_user
      SPRING_FLYWAY_PASSWORD: db_pwd_changemeinprod

volumes:
  postgres_data: